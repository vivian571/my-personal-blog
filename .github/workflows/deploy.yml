name: Next.js Blog Agentic Deployment

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-name: nextjs-build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci

      # Check if this push was triggered by the OpenClaw Agent
      # If the commit message contains [Deploy], skip cache loading to ensure fresh markdown
      - name: Agent Cache Busting
        id: check-cache
        run: |
          if [[ "${{ github.event.head_commit.message }}" == *"[Deploy]"* ]]; then
            echo "Agent Deploy Detected. Bypassing Next.js Cache."
            echo "USE_CACHE=false" >> $GITHUB_ENV
          else
            echo "USE_CACHE=true" >> $GITHUB_ENV
          fi

      - name: Restore Next.js Build Cache
        if: env.USE_CACHE == 'true'
        uses: actions/cache@v3
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Build Blog
        run: npm run build
        
      # If you use Vercel, Netlify, or self-hosted Docker, place the deploy step here:
      # - name: Deploy to Vercel
      #   uses: amondnet/vercel-action@v20
      #   with:
      #     vercel-token: ${{ secrets.VERCEL_TOKEN }}
      #     vercel-org-id: ${{ secrets.ORG_ID}}
      #     vercel-project-id: ${{ secrets.PROJECT_ID}}
      #     vercel-args: '--prod'
